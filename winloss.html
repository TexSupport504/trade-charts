<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
<style>
:root{--b:#191919;--t:#e3e3e3;--m:#9b9a97;--d:#2f2f2f;--g:#4a9e6e;--r:#c75050}
*{margin:0;box-sizing:border-box}html,body{width:100%;height:100%;background:var(--b);color:var(--t);font:13px/1 ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
body{display:flex;gap:24px;align-items:stretch;padding:16px 20px}
.ch{width:35%;display:flex;align-items:center;justify-content:center}
.ch canvas{max-height:220px}
.rows{width:65%;display:flex;flex-direction:column;justify-content:center}
.row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--d)}
.row:last-child{border-bottom:0}
.row .l{font:500 9px/1 inherit;text-transform:uppercase;letter-spacing:.8px;color:var(--m)}
.row .v{font:600 16px/1 SFMono-Regular,"Roboto Mono",Menlo,monospace;margin-top:3px;letter-spacing:-.3px}
.p{color:var(--g)}.n{color:var(--r)}
</style></head><body>
<div class="ch"><canvas id="c"></canvas></div>
<div class="rows" id="rows"></div>
<script src="data.js"></script>
<script>
const s=D.statistics;
new Chart(document.getElementById('c'),{type:'doughnut',data:{labels:['Wins','Losses'],datasets:[{data:[s.winning_trades,s.losing_trades],backgroundColor:['#4a9e6e','#c75050'],borderWidth:0,cutout:'72%'}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}}}});
const f=n=>(n>=0?'+$':'-$')+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2});
const rows=[
['Win Rate',s.win_rate+'%',s.win_rate>=50?'p':'n','Profit Factor',s.profit_factor.toFixed(2),s.profit_factor>=1?'p':'n'],
['Avg Win',f(s.average_win),'p','Avg Loss',f(s.average_loss),'n'],
['Best Trade',f(s.best_trade),'p','Worst Trade',f(s.worst_trade),'n'],
['Win Streak',s.max_win_streak+'','','Loss Streak',s.max_loss_streak+'',''],
['Max Drawdown','-$'+s.max_drawdown.toLocaleString('en-US',{minimumFractionDigits:2}),'n','Total P&L',f(s.total_pnl),s.total_pnl>=0?'p':'n'],
];
document.getElementById('rows').innerHTML=rows.map(r=>`<div class="row"><div><div class="l">${r[0]}</div><div class="v ${r[2]}">${r[1]}</div></div><div style="text-align:right"><div class="l">${r[3]}</div><div class="v ${r[5]}">${r[4]}</div></div></div>`).join('');
</script></body></html>
