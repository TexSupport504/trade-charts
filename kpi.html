<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{--b:#191919;--t:#e3e3e3;--m:#9b9a97;--d:#2f2f2f;--g:#4a9e6e;--r:#c75050}
*{margin:0;box-sizing:border-box}html,body{width:100%;overflow:hidden;background:var(--b);color:var(--t);font:13px/1 ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
.r{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--d)}
.k{padding:16px 20px;border-right:1px solid var(--d)}.k:nth-child(4n){border-right:0}
.l{font:500 9px/1 inherit;text-transform:uppercase;letter-spacing:1.2px;color:var(--m)}
.v{font:600 24px/1 ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;font-variant-numeric:tabular-nums;margin-top:6px;letter-spacing:-.5px}
.s{font-size:10px;color:var(--m);margin-top:5px}
.p{color:var(--g)}.n{color:var(--r)}
.sp{display:flex;gap:1px;align-items:flex-end;height:20px;margin-top:8px}.sp i{width:4px;min-height:1px;display:block}.sp .u{background:var(--g)}.sp .d{background:var(--r)}
</style></head><body>
<div id="o"></div>
<script src="data.js"></script>
<script>
const s=D.statistics,tr=D.trades,dp=D.daily_pnl;
const rc=tr.slice(-20),sk=rc.map(t=>{const h=Math.min(Math.max(Math.abs(t.pnl_usd)/500*20,2),20);return`<i class="${t.pnl_usd>=0?'u':'d'}" style="height:${h}px"></i>`}).join('');
const now=new Date(),mk=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
let mp=0,mt=0;for(const[dt,v]of Object.entries(dp)){if(dt.startsWith(mk)){mp+=v.net;mt+=v.trades.length}}
const ws=new Date(now);ws.setDate(now.getDate()-now.getDay());let wp=0;
for(const[dt,v]of Object.entries(dp)){if(new Date(dt+'T12:00:00')>=ws)wp+=v.net}
const f=n=>(n>=0?'+$':'-$')+Math.abs(n).toLocaleString('en-US',{maximumFractionDigits:0});
const c=n=>n>=0?'p':'n';
const all=[
[`TOTAL P&L`,f(s.total_pnl),c(s.total_pnl),s.total_trades+' trades',`<div class="sp">${sk}</div>`],
[`WIN RATE`,s.win_rate+'%',c(s.win_rate-50),s.winning_trades+'W / '+s.losing_trades+'L'],
[`PROFIT FACTOR`,s.profit_factor.toFixed(2),c(s.profit_factor-1),'Avg win '+f(s.average_win)],
[`THIS MONTH`,f(mp),c(mp),mt+' trades'],
[`THIS WEEK`,f(wp),c(wp),'Current week'],
[`MAX DRAWDOWN`,'-$'+Math.abs(s.max_drawdown).toLocaleString('en-US',{maximumFractionDigits:0}),'n','From peak'],
[`BEST TRADE`,f(s.best_trade),'p','Single max'],
[`WORST TRADE`,f(s.worst_trade),'n','Single min'],
];
const mk2=a=>`<div class="k"><div class="l">${a[0]}</div><div class="v ${a[2]}">${a[1]}</div><div class="s">${a[3]}</div>${a[4]||''}</div>`;
document.getElementById('o').innerHTML=`<div class="r">${all.slice(0,4).map(mk2).join('')}</div><div class="r">${all.slice(4).map(mk2).join('')}</div>`;
</script></body></html>
